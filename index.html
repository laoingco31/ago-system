<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Loading...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f9f9f9;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      flex-direction: column;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #ccc;
      border-top-color: #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .text {
      font-size: 18px;
      color: #555;
    }
  </style>
</head>
<body>

  <div class="spinner"></div>
  <div class="text">Loading... Please wait</div>

  <script>
    // Redirect to Laravel route after 2 seconds
    setTimeout(function () {
      window.location.href = "/";
    }, 2000);
  </script>

</body>
</html>
